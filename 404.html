<!DOCTYPE html>
<html>
<head>
    <script src="uv/uv.config.js"></script>
    <script>
        // This script fixes the "Refresh" bug
        const prefix = window.__uv$config.prefix;
        if (location.pathname.startsWith(prefix)) {
            location.reload();
        } else {
            // Redirect home if it's a real 404
            location.href = "/";
        }
    </script>
</head>
<body></body>
</html>
