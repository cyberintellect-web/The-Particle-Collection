<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT // SYSTEM_V02</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --bg: #000000;
            --grid-line: #1a1a1a;
            --accent: #ffffff;
            --glitch-red: #ff003c;
            --glitch-blue: #00f2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--accent);
            font-family: 'Fira Code', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar UI */
        .sidebar {
            width: 300px;
            border-right: 1px solid var(--grid-line);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            background: var(--bg);
        }

        .logo {
            font-weight: 500;
            letter-spacing: -1px;
            font-size: 1.2rem;
        }

        .terminal {
            font-size: 0.7rem;
            color: #555;
            height: 200px;
            overflow: hidden;
            line-height: 1.6;
        }

        /* The Grid Canvas */
        .grid-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            position: relative;
        }

        .cell {
            border: 0.5px solid var(--grid-line);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .cell:hover {
            background: var(--accent);
            transform: scale(0.9);
            box-shadow: 0 0 20px var(--accent);
            z-index: 5;
        }

        .cell.active {
            background: var(--accent);
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
        }

        /* Glitch Effects */
        .glitch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background: repeating-linear-gradient(0deg, #fff 0px, #fff 1px, transparent 2px);
        }

        .status-bar {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button {
            background: none;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="logo">ARCHITECT.SYS</div>
            <p style="font-size: 0.7rem; opacity: 0.4;">V.02 // NULL_VOID</p>
            <button onclick="scrambleGrid()">SCRAMBLE_MATRIX</button>
            <button onclick="resetGrid()">CLEAR_ARRAY</button>
        </div>
        
        <div class="terminal" id="term">
            > Initializing architecture...<br>
            > Grid synced to cursor...<br>
            > Awaiting user input...
        </div>
    </div>

    <div class="grid-container" id="grid">
        </div>

    <div class="glitch-overlay"></div>
    <div class="status-bar" id="coords">X: 00 // Y: 00</div>

    <script>
        const grid = document.getElementById('grid');
        const term = document.getElementById('term');
        const coords = document.getElementById('coords');

        // Create 400 cells
        for (let i = 0; i < 400; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            
            // Mouse Enter Effect
            cell.addEventListener('mouseenter', () => {
                cell.classList.toggle('active');
                logUpdate();
                updateCoords(i);
            });

            grid.appendChild(cell);
        }

        function updateCoords(index) {
            const x = index % 20;
            const y = Math.floor(index / 20);
            coords.innerText = `X: ${x.toString().padStart(2, '0')} // Y: ${y.toString().padStart(2, '0')}`;
        }

        function logUpdate() {
            const messages = [
                "Structure alignment modified.",
                "Geometry cache updated.",
                "Vector point injected.",
                "Null-space expanded.",
                "Grid integrity: 98.4%",
                "Shadow-render complete."
            ];
            const msg = messages[Math.floor(Math.random() * messages.length)];
            term.innerHTML = `> ${msg}<br>` + term.innerHTML;
            if (term.childNodes.length > 20) term.lastChild.remove();
        }

        function scrambleGrid() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => {
                if (Math.random() > 0.8) c.classList.toggle('active');
            });
            term.innerHTML = `> GLOBAL SCRAMBLE INITIATED<br>` + term.innerHTML;
        }

        function resetGrid() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => c.classList.remove('active'));
            term.innerHTML = `> ARRAY PURGED<br>` + term.innerHTML;
        }

        // Random Glitch Timer
        setInterval(() => {
            document.body.style.filter = Math.random() > 0.98 ? 'invert(1)' : 'none';
        }, 100);
    </script>
</body>
</html>
