<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Google Drive</title>
    <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --secondary: #171717;
            --border: #262626;
            --neon: #00ff88;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Bar */
        nav {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 600;
            letter-spacing: -1px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-pill {
            padding: 4px 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--neon);
            color: var(--neon);
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono';
        }

        /* Main Search UI */
        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        input {
            width: 100%;
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 20px 25px;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #555;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .quick-actions {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            background: var(--secondary);
            border: 1px solid var(--border);
            color: #888;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Terminal Logs */
        .terminal {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #666;
            max-height: 150px;
            overflow-y: auto;
        }

        .terminal span { color: var(--neon); }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VOID_NODE <span class="status-pill">BARE_CONNECTED</span></div>
        <div style="display: flex; gap: 20px; font-size: 0.8rem; color: #555;">
            <span>SECURE_TUNNEL: ON</span>
            <span>PING: 24ms</span>
        </div>
    </nav>

    <div class="container">
        <h1 style="font-weight: 400; margin-bottom: 40px; letter-spacing: -2px; font-size: 2.5rem;">Access anything.</h1>
        
        <div class="search-box">
            <form id="proxy-form">
                <input type="text" id="url-input" placeholder="Search the web or enter a URL..." autocomplete="off">
            </form>
            
            <div class="quick-actions">
                <button class="action-btn" onclick="launch('https://discord.com')">Discord</button>
                <button class="action-btn" onclick="launch('https://youtube.com')">YouTube</button>
                <button class="action-btn" onclick="launch('https://geforce-now.com')">GeForce Now</button>
                <button class="action-btn" onclick="openAboutBlank()">Open in About:Blank</button>
            </div>
        </div>
    </div>

    <div class="terminal" id="logs">
        [SYS] Initializing local node...<br>
        [SYS] <span>BARE_SERVER:</span> vault-bare.vercel.app<br>
        [SYS] Connection established.
    </div>

    <script>
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('url-input');
        const logs = document.getElementById('logs');

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `[REQ] ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;

            addLog(`Routing <span>${query}</span> through Bare...`);
            
            // Note: To make this functional, you'd integrate the Ultraviolet 
            // register sw.js logic here pointing to your bare server.
            
            setTimeout(() => {
                alert("Bare Server Connected at: https://vault-bare.vercel.app/\n\nTo finish this, you need to add your Ultraviolet or Tompito script files to this project.");
            }, 500);
        };

        function launch(url) {
            input.value = url;
            form.dispatchEvent(new Event('submit'));
        }

        // About:Blank Cloaker
        function openAboutBlank() {
            const win = window.open('about:blank', '_blank');
            if (!win || win.closed) {
                alert('Pop-up blocked! Please allow pop-ups for stealth mode.');
                return;
            }
            const iframe = win.document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.src = window.location.href;
            win.document.body.appendChild(iframe);
            window.location.replace('https://classroom.google.com'); // Redirect current tab to safety
        }

        // Emergency Panic Key (Esc)
        window.onkeydown = (e) => {
            if (e.key === 'Escape') {
                window.location.href = 'https://google.com';
            }
        };
    </script>
</body>
</html>
