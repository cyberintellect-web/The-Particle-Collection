<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Google Drive</title>
    <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
    
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --secondary: #171717;
            --border: #262626;
            --neon: #00ff88;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 600;
            letter-spacing: -1px;
            font-size: 1.1rem;
        }

        .status-pill {
            padding: 4px 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--neon);
            color: var(--neon);
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono';
        }

        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
        }

        input {
            width: 100%;
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 20px 25px;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #555;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .quick-actions {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .action-btn {
            background: var(--secondary);
            border: 1px solid var(--border);
            color: #888;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .terminal {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VOID_NODE</div>
        <div class="status-pill" id="status">CONNECTING...</div>
    </nav>

    <div class="container">
        <h1 style="font-weight: 400; margin-bottom: 40px; letter-spacing: -2px; font-size: 2.5rem;">Access anything.</h1>
        
        <div class="search-box">
            <form id="uv-form">
                <input type="text" id="uv-address" placeholder="Search or type a URL..." autocomplete="off">
            </form>
            
            <div class="quick-actions">
                <button class="action-btn" onclick="launch('https://discord.com')">Discord</button>
                <button class="action-btn" onclick="launch('https://youtube.com')">YouTube</button>
                <button class="action-btn" onclick="openAboutBlank()">Stealth Mode</button>
            </div>
        </div>
    </div>

    <div class="terminal" id="terminal">
        [SYS] Initializing Node...
    </div>

    <script>
        const form = document.getElementById('uv-form');
        const address = document.getElementById('uv-address');
        const status = document.getElementById('status');
        const terminal = document.getElementById('terminal');

        // Force Bare server to your Vercel link
        window.__uv$config.bare = 'https://vault-bare.vercel.app/';

        // Register Service Worker silently
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/uv.sw.js', {
                scope: __uv$config.prefix
            }).then(() => {
                status.innerText = "BARE_ACTIVE";
                terminal.innerHTML += "<br>[SYS] SW Registered.";
            }).catch((err) => {
                status.innerText = "CONN_ERROR";
                terminal.innerHTML += `<br>[ERR] ${err.message}`;
            });
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            let url = address.value.trim();

            // Search engine logic
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            terminal.innerHTML += `<br>[REQ] Routing: ${url}`;
            
            // Redirect to UV proxied URL
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        };

        function launch(url) {
            address.value = url;
            form.dispatchEvent(new Event('submit'));
        }

        function openAboutBlank() {
            const win = window.open('about:blank', '_blank');
            if (win) {
                const iframe = win.document.createElement('iframe');
                iframe.style.cssText = "position:fixed;top:0;left:0;bottom:0;right:0;width:100%;height:100%;border:none;margin:0;padding:0;overflow:hidden;z-index:999999;";
                iframe.src = window.location.href;
                win.document.body.appendChild(iframe);
                window.location.replace('https://classroom.google.com');
            }
        }
    </script>
</body>
</html>
