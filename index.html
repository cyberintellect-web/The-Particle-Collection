<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE_BREAKER // V.04</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00ff41; /* Classic Matrix/Terminal Green */
            --glass: rgba(255, 255, 255, 0.05);
            --border: #333;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--accent);
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* The "Desktop" */
        .desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: 
                linear-gradient(90deg, var(--glass) 1px, transparent 1px),
                linear-gradient(var(--glass) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Glass Windows */
        .window {
            position: absolute;
            background: rgba(10, 10, 12, 0.9);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: move;
            min-width: 200px;
        }

        .window-header {
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
            padding-bottom: 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        /* The Game Character (A rogue 'Cursor') */
        #player {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.1s;
        }

        /* Enemy "Elements" */
        .enemy {
            position: absolute;
            background: #ff0055;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
        }

        .hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            z-index: 2000;
            background: black;
            padding: 10px;
            border: 1px solid var(--accent);
        }

        #glitch-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.1;
        }
    </style>
</head>
<body>

    <div id="player"></div>
    <canvas id="glitch-canvas"></canvas>

    <div class="desktop" id="desktop">
        <div class="hud">
            SYSTEM_STABILITY: <span id="stability">100</span>%<br>
            CORE_SCORE: <span id="score">0</span>
        </div>

        <div class="window" style="top: 100px; left: 100px;" id="win1">
            <div class="window-header"><span>DIRECTORY_BROWSER</span> [X]</div>
            <div class="content">
                <p>Welcome to Site_Breaker.</p>
                <p>Use <b>WASD</b> to move your core.</p>
                <p>Avoid the "Floating Errors".</p>
                <button onclick="spawnEnemy()" style="background: var(--accent); border: none; padding: 5px; cursor: pointer;">FORCE_ERROR</button>
            </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const desktop = document.getElementById('desktop');
        const stabilityEl = document.getElementById('stability');
        const scoreEl = document.getElementById('score');

        let pX = window.innerWidth / 2;
        let pY = window.innerHeight / 2;
        let stability = 100;
        let score = 0;
        let enemies = [];

        // Movement
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function update() {
            if (keys['w']) pY -= 5;
            if (keys['s']) pY += 5;
            if (keys['a']) pX -= 5;
            if (keys['d']) pX += 5;

            player.style.left = pX + 'px';
            player.style.top = pY + 'px';

            moveEnemies();
            checkCollisions();
            
            requestAnimationFrame(update);
        }

        function spawnEnemy() {
            const enemy = document.createElement('div');
            enemy.className = 'enemy';
            enemy.innerText = '404_NOT_FOUND';
            enemy.style.left = Math.random() * window.innerWidth + 'px';
            enemy.style.top = Math.random() * window.innerHeight + 'px';
            
            const data = {
                el: enemy,
                x: parseFloat(enemy.style.left),
                y: parseFloat(enemy.style.top),
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4
            };
            
            desktop.appendChild(enemy);
            enemies.push(data);
            score += 10;
            scoreEl.innerText = score;
        }

        function moveEnemies() {
            enemies.forEach(en => {
                en.x += en.vx;
                en.y += en.vy;

                if (en.x < 0 || en.x > window.innerWidth) en.vx *= -1;
                if (en.y < 0 || en.y > window.innerHeight) en.vy *= -1;

                en.el.style.left = en.x + 'px';
                en.el.style.top = en.y + 'px';
            });
        }

        function checkCollisions() {
            enemies.forEach(en => {
                const dist = Math.hypot(pX - en.x, pY - en.y);
                if (dist < 30) {
                    stability -= 0.5;
                    stabilityEl.innerText = Math.floor(stability);
                    document.body.style.filter = `hue-rotate(${100 - stability}deg)`;
                    
                    if (stability <= 0) {
                        alert("SYSTEM CRITICAL: REBOOTING");
                        location.reload();
                    }
                }
            });
        }

        // Draggable Windows (Simplified)
        let activeWin = null;
        document.addEventListener('mousedown', (e) => {
            if (e.target.closest('.window')) activeWin = e.target.closest('.window');
        });
        document.addEventListener('mouseup', () => activeWin = null);
        document.addEventListener('mousemove', (e) => {
            if (activeWin) {
                activeWin.style.left = e.clientX - 100 + 'px';
                activeWin.style.top = e.clientY - 20 + 'px';
            }
        });

        // Start
        setInterval(spawnEnemy, 3000);
        update();

    </script>
</body>
</html>
